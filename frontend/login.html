<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SHMS</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/animations.css">

  <style>
    body {
      background: radial-gradient(circle at top right, #f0f7ff, #ffffff),
                  radial-gradient(circle at bottom left, #f5f3ff, #ffffff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-container {
      width: 100%;
      max-width: 480px;
      perspective: 1000px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      animation: fadeInScale 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.95) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .login-header {
      padding: 3rem 2.5rem 2rem;
      text-align: center;
    }

    .logo-box {
      width: 64px;
      height: 64px;
      background: var(--gradient-primary);
      border-radius: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      margin: 0 auto 1.5rem;
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
    }

    .login-header h2 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
    }

    .login-header p {
      color: var(--gray-500);
      font-size: 0.9375rem;
    }

    .login-tabs {
      display: flex;
      background: var(--gray-100);
      padding: 0.5rem;
      border-radius: 1rem;
      margin: 0 2.5rem 2rem;
    }

    .tab-btn {
      flex: 1;
      padding: 0.75rem;
      border: none;
      background: transparent;
      border-radius: 0.75rem;
      font-weight: 600;
      color: var(--gray-500);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-btn.active {
      background: white;
      color: var(--primary);
      box-shadow: var(--shadow-sm);
    }

    .login-body {
      padding: 0 2.5rem 3rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 0.5rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      padding: 0.875rem 1rem 0.875rem 3rem;
      border-radius: 1rem;
      border: 1px solid var(--gray-200);
      font-family: inherit;
      font-size: 0.9375rem;
      transition: all 0.2s ease;
      background: white;
    }

    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
      outline: none;
    }

    .shake {
      animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
    }

    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }

    .login-form {
      display: none;
    }

    .login-form.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .forgot-pass {
      text-align: right;
      margin-top: -0.75rem;
      margin-bottom: 1.5rem;
    }

    .forgot-pass a {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--primary);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card" id="loginCard">
      <div class="login-header">
        <div class="logo-box">
          <i data-lucide="heart-pulse" size="32"></i>
        </div>
        <h2>Welcome Back</h2>
        <p>Please enter your details to sign in</p>
      </div>

      <div class="login-tabs">
        <button class="tab-btn active" onclick="switchTab('doctor')">Doctor</button>
        <button class="tab-btn" onclick="switchTab('admin')">Admin</button>
      </div>

      <div class="login-body">
        <!-- DOCTOR FORM -->
        <form id="doctorForm" class="login-form active" onsubmit="handleLogin(event,'doctor')">
          <div class="form-group">
            <label>Name / ID</label>
            <div class="input-wrapper">
              <i data-lucide="user" size="18"></i>
              <input class="form-input" id="doctorId" placeholder="e.g. Dr. Aditya Kulkarni" required>
            </div>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
              <i data-lucide="lock" size="18"></i>
              <input type="password" class="form-input" id="doctorPassword" placeholder="••••••••" required>
            </div>
          </div>

          <div class="forgot-pass">
            <a href="#">Forgot Password?</a>
          </div>

          <button class="btn btn-primary w-full btn-lg" type="submit">
            Sign in as Doctor <i data-lucide="chevron-right"></i>
          </button>
        </form>

        <!-- ADMIN FORM -->
        <form id="adminForm" class="login-form" onsubmit="handleLogin(event,'admin')">
          <div class="form-group">
            <label>Admin ID</label>
            <div class="input-wrapper">
              <i data-lucide="shield" size="18"></i>
              <input class="form-input" id="adminId" placeholder="Admin username" required>
            </div>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
              <i data-lucide="lock" size="18"></i>
              <input type="password" class="form-input" id="adminPassword" placeholder="••••••••" required>
            </div>
          </div>

          <div class="forgot-pass">
            <a href="#">Forgot Password?</a>
          </div>

          <button class="btn btn-primary w-full btn-lg" type="submit" style="background: var(--accent);">
            Sign in as Admin <i data-lucide="chevron-right"></i>
          </button>
        </form>

        <div style="margin-top: 2rem; text-align: center;">
          <p style="font-size: 0.875rem; color: var(--gray-500);">
            Don't have an account? <a href="#" style="color: var(--primary); font-weight: 600;">Contact IT Support</a>
          </p>
        </div>
      </div>
    </div>

    <div style="margin-top: 2rem; text-align: center; color: var(--gray-400); font-size: 0.8125rem;">
      <p>© 2026 Smart Hospital Management System. Secure Access Only.</p>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    if (window.lucide) lucide.createIcons();

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));

      if (tab === 'doctor') {
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        document.getElementById('doctorForm').classList.add('active');
      } else {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('adminForm').classList.add('active');
      }
    }

    async function handleLogin(e, role) {
      e.preventDefault();
      
      const idInput = role === 'doctor' ? 'doctorId' : 'adminId';
      const passInput = role === 'doctor' ? 'doctorPassword' : 'adminPassword';
      
      const name = document.getElementById(idInput).value;
      const pass = document.getElementById(passInput).value;

      const btn = e.submitter;
      const originalText = btn.innerHTML;
      btn.innerHTML = '<i data-lucide="loader-2" class="animate-spin"></i> Authenticating...';
      
      // Added: Handle Render's cold start
      const wakeUpTimer = setTimeout(() => {
        btn.innerHTML = '<i data-lucide="loader-2" class="animate-spin"></i> Waking up server (Render Free Tier)...';
        if (window.lucide) lucide.createIcons();
      }, 3000);

      if (window.lucide) lucide.createIcons();

      try {
        const response = await SHMS_API.login(role, name, pass);
        clearTimeout(wakeUpTimer);
        
        if (response.success) {
          localStorage.setItem('jwt_token', response.token);
          localStorage.setItem('userRole', role);
          localStorage.setItem('userName', response.user.name);
          if (role === 'admin') {
            window.location.href = 'admin.html';
          } else if (role === 'doctor') {
            window.location.href = 'doctor.html';
          } else {
            window.location.href = 'index.html';
          }
        } else {
          shake();
          alert("Login failed: " + response.message);
          btn.innerHTML = originalText;
        }
      } catch (error) {
        shake();
        alert("Error connecting to server: " + error.message);
        btn.innerHTML = originalText;
      }
      if (window.lucide) lucide.createIcons();
    }

    function shake() {
      const card = document.getElementById('loginCard');
      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 400);
    }
  </script>

</body>
</html>
