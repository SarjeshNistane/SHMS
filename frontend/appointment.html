<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment - SHMS</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
  
  <style>
    body {
      background: #f8fafc;
    }

    .navbar {
      background: white;
      padding: 1rem 0;
      box-shadow: var(--shadow-sm);
      margin-bottom: 3rem;
    }

    .page-header {
      background: var(--gradient-primary);
      padding: 4rem 0;
      color: white;
      margin-bottom: -4rem;
    }

    .page-header h1 { color: white; font-size: 2.5rem; letter-spacing: -1px; }

    .main-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 2rem;
      margin-bottom: 4rem;
    }

    .booking-card {
      background: white;
      border-radius: 2rem;
      padding: 3rem;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--gray-100);
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      font-size: 1.25rem;
    }

    .section-title i {
      color: var(--primary);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 0.5rem;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      border: 1px solid var(--gray-200);
      background: #fcfcfc;
      font-family: inherit;
      font-size: 0.9375rem;
      transition: all 0.2s;
    }

    .form-input:focus, .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
      outline: none;
      background: white;
    }

    .form-textarea {
      min-height: 100px;
      resize: vertical;
    }

    .emergency-toggle {
      background: #fff1f2;
      border: 1px solid #fecdd3;
      padding: 1rem;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
    }

    .emergency-toggle input {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    .emergency-toggle label {
      margin-bottom: 0;
      color: #991b1b;
      font-weight: 700;
      cursor: pointer;
    }

    /* Queue Sidebar */
    .queue-sidebar {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .queue-card {
      background: white;
      border-radius: 1.5rem;
      padding: 2rem;
      box-shadow: var(--shadow-md);
    }

    .queue-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: #f8fafc;
      border-radius: 1rem;
      margin-bottom: 0.75rem;
      border-left: 4px solid var(--primary);
    }

    .queue-item.emergency {
      border-left-color: var(--danger);
      background: #fff1f2;
    }

    .queue-item-info h4 {
      font-size: 0.9375rem;
      margin-bottom: 0.25rem;
    }

    .queue-item-info p {
      font-size: 0.75rem;
      color: var(--gray-500);
    }

    @media (max-width: 992px) {
      .main-grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
  
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
</head>
<body>

  <nav class="navbar">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
      <a href="index.html" class="brand" style="color: var(--primary); font-family: var(--font-display); font-weight: 800; font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
        <i data-lucide="heart-pulse"></i>
        <span>SHMS</span>
      </a>
      <a href="index.html" class="btn btn-secondary">Back to Home</a>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <h1>Book Appointment</h1>
      <p style="opacity: 0.8; margin-top: 0.5rem;">Secure your slot with our world-class specialists in seconds.</p>
    </div>
  </header>

  <main class="container">
    <div class="main-grid">
      <!-- FORM -->
      <div class="booking-card">
        <form id="appointmentForm">
          <h3 class="section-title"><i data-lucide="user"></i> Patient Information</h3>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" class="form-input" id="patientName" placeholder="Enter your full name" required>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label>Age</label>
              <input type="number" class="form-input" id="patientAge" placeholder="Years" min="0" required>
            </div>
            <div class="form-group">
              <label>Gender</label>
              <select class="form-select" id="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
              </select>
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label>Email (Optional)</label>
              <input type="email" class="form-input" id="patientEmail" placeholder="your@email.com">
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" class="form-input" id="patientPhone" placeholder="+91 XXXX XXX XXX" required>
            </div>
          </div>

          <h3 class="section-title" style="margin-top: 2rem;"><i data-lucide="calendar"></i> Appointment Details</h3>
          
          <div class="form-group">
            <label>Department</label>
            <select class="form-select" id="department" required>
              <option value="">Select Department</option>
              <option>General Medicine</option>
              <option>Cardiology</option>
              <option>Pediatrics</option>
              <option>Neurology</option>
              <option>Trauma Care</option>
              <option>Emergency Medicine</option>
              <option>Surgery</option>
            </select>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label>Select Doctor</label>
              <select class="form-select" id="doctorId" required>
                <option value="">Select Doctor</option>
              </select>
            </div>
            <div class="form-group">
              <label>Time Slot</label>
              <select class="form-select" id="appointmentTime" required>
                <option value="">Select Slot</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Symptoms / Reason for Visit</label>
            <textarea class="form-textarea" id="reason" placeholder="Briefly describe your symptoms..." required></textarea>
          </div>

          <div class="emergency-toggle">
            <input type="checkbox" id="emergency">
            <label for="emergency">
              <i data-lucide="alert-circle" size="18" style="vertical-align: middle; margin-right: 4px;"></i>
              This is a medical emergency
            </label>
          </div>

          <div style="margin-top: 2.5rem;">
            <button type="submit" class="btn btn-primary btn-lg w-full" style="padding: 1.25rem;">
              Confirm Appointment Booking <i data-lucide="check-circle"></i>
            </button>
          </div>
        </form>
      </div>

      <!-- SIDEBAR -->
      <div class="queue-sidebar">
        <div class="queue-card">
          <h3 class="section-title" style="margin-bottom: 1.5rem;"><i data-lucide="activity"></i> Live Hospital Status</h3>
          <div id="queueList">
            <div style="text-align: center; padding: 2rem; color: var(--gray-400);">
              <i data-lucide="loader-2" class="animate-spin" size="32"></i>
              <p style="margin-top: 1rem;">Connecting to live pulse...</p>
            </div>
          </div>
        </div>

        <div class="card" style="background: var(--accent); color: white;">
          <h4 style="color: white; margin-bottom: 1rem;">Need Help?</h4>
          <p style="font-size: 0.875rem; opacity: 0.8; margin-bottom: 1.5rem;">Our customer support is available 24/7 to assist you with your booking.</p>
          <a href="#" class="btn btn-primary w-full" style="background: white; color: var(--accent);">Call Support</a>
        </div>
      </div>
    </div>
  </main>

  <script src="js/utils.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>

  <script>
    let allDoctors = [];
    let allAppointments = [];

    async function initializeAppointmentPage() {
      try {
        const [dashboard, doctorsRes, apptRes] = await Promise.all([
          SHMS_API.getDashboardState(),
          SHMS_API.getDoctors(),
          SHMS_API.getPublicAppointments()
        ]);
        
        allDoctors = doctorsRes.doctors || [];
        allAppointments = apptRes.appointments || [];
        renderQueue(dashboard.emergencies);

        setupRealtime((snapshot) => {
          renderQueue(snapshot.emergencies);
        });
      } catch (error) {
        console.error("Appointment page sync error:", error);
      }
      generateSlots();
    }

    function updateDoctorList() {
      const dept = document.getElementById("department").value;
      const doctorSelect = document.getElementById("doctorId");
      doctorSelect.innerHTML = `<option value="">Select Doctor</option>`;
      
      const filtered = allDoctors.filter(doc => !dept || doc.specialization === dept);
      filtered.forEach(doc => {
        const opt = document.createElement("option");
        opt.value = doc._id;
        opt.textContent = `${doc.name} (${doc.gender})`;
        doctorSelect.appendChild(opt);
      });
      generateSlots();
    }

    function generateSlots() {
      const select = document.getElementById("appointmentTime");
      const doctorId = document.getElementById("doctorId").value;
      select.innerHTML = `<option value="">Select Slot</option>`;

      const doctorBookedSlots = allAppointments
        .filter(a => a.doctorId && a.doctorId._id === doctorId)
        .map(a => a.time);

      for (let t = 8 * 60; t <= 20 * 60; t += 30) {
        let h = Math.floor(t / 60);
        let m = t % 60;
        let val = `${h < 10 ? "0"+h : h}:${m === 0 ? "00" : m}`;
        if (doctorBookedSlots.includes(val)) continue;

        let label = `${h % 12 || 12}:${m === 0 ? "00" : m} ${h >= 12 ? "PM" : "AM"}`;
        let opt = document.createElement("option");
        opt.value = val;
        opt.textContent = label;
        select.appendChild(opt);
      }
    }

    function renderQueue(emergencies) {
      const box = document.getElementById("queueList");
      const active = emergencies.filter(e => e.status !== 'COMPLETED');
      let html = "";

      if (!active.length && !allAppointments.length) {
        html = "<p style='text-align: center; color: var(--gray-400); padding: 2rem;'>No active cases or appointments.</p>";
      } else {
        if (active.length) {
          html += "<h4 class='mb-4' style='font-size: 0.875rem; text-transform: uppercase; color: var(--gray-400); letter-spacing: 1px;'>Active Emergencies</h4>";
          html += active.map((e, i) => `
            <div class="queue-item emergency">
              <div class="queue-item-info">
                <h4>${e.patientId?.name || 'Critical Patient'}</h4>
                <p>Priority: ${e.priority} • ${e.status.replace('_', ' ')}</p>
              </div>
            </div>
          `).join('');
        }

        if (allAppointments.length) {
          html += "<h4 class='mb-4 mt-8' style='font-size: 0.875rem; text-transform: uppercase; color: var(--gray-400); letter-spacing: 1px;'>Today's Schedule</h4>";
          html += allAppointments.slice(0, 5).map(a => `
            <div class="queue-item">
              <div class="queue-item-info">
                <h4>${a.patientName}</h4>
                <p>${a.time} • ${a.doctorId?.name || 'General Medicine'}</p>
              </div>
            </div>
          `).join('');
        }
      }
      box.innerHTML = html;
      if (window.lucide) lucide.createIcons();
    }

    document.getElementById("appointmentForm").addEventListener("submit", async function(e){
      e.preventDefault();
      const btn = e.submitter;
      const originalText = btn.innerHTML;
      btn.innerHTML = '<i data-lucide="loader-2" class="animate-spin"></i> Processing Booking...';
      if (window.lucide) lucide.createIcons();

      const name = document.getElementById("patientName").value;
      const age = document.getElementById("patientAge").value;
      const dept = document.getElementById("department").value;
      const doctorPref = document.getElementById("doctorId").value;
      const time = document.getElementById("appointmentTime").value;
      const emergency = document.getElementById("emergency").checked;
      const reason = document.getElementById("reason").value;

      try {
        if (emergency) {
          await SHMS_API.triggerEmergency({
            deviceId: `web-form-${Date.now()}`,
            priority: 'MEDIUM',
            scenarioId: 'medical-consult'
          });
          alert("Emergency Case logged. Please proceed to the hospital immediately.");
        } else {
          await SHMS_API.bookAppointment({
            patientName: name,
            patientAge: age,
            department: dept,
            doctorId: doctorPref,
            time: time,
            reason: reason
          });
          alert("Appointment Booked Successfully for " + time);
        }
        this.reset();
      } catch (error) {
        alert("Failed to book: " + error.message);
      }
      btn.innerHTML = originalText;
      if (window.lucide) lucide.createIcons();
    });

    document.addEventListener("DOMContentLoaded", () => {
      initializeAppointmentPage();
      document.getElementById("department").addEventListener("change", updateDoctorList);
      document.getElementById("doctorId").addEventListener("change", generateSlots);
      if (window.lucide) lucide.createIcons();
    });
  </script>
</body>
</html>
